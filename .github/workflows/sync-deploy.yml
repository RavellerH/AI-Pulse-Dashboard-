name: Sync X + Deploy

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python: fetch X posts ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install sync dependencies
        run: pip install -r sync/requirements.txt

      - name: Get week stamp (for session rotation)
        id: week
        run: echo "stamp=$(date +%Y-%U)" >> $GITHUB_OUTPUT

      - name: Restore twscrape session DB
        id: cache-session
        uses: actions/cache@v4
        with:
          path: sync/.twscrape.db
          key: twscrape-${{ secrets.X_USERNAME }}-${{ steps.week.outputs.stamp }}
          restore-keys: |
            twscrape-${{ secrets.X_USERNAME }}-

      - name: Sync X posts
        id: sync
        continue-on-error: true          # deploy with existing data if sync fails
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          X_EMAIL_PASSWORD: ${{ secrets.X_EMAIL_PASSWORD }}   # optional; defaults to X_PASSWORD
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # optional
        run: python -m sync.sync

      - name: Report sync status
        if: steps.sync.outcome == 'failure'
        run: echo "⚠️ X sync failed — deploying with existing data. Check logs above for the error."

      - name: Save twscrape session DB
        if: steps.sync.outcome == 'success' && steps.cache-session.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: sync/.twscrape.db
          key: twscrape-${{ secrets.X_USERNAME }}-${{ steps.week.outputs.stamp }}

      # ── Node: build Vite app ───────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── Deploy to GitHub Pages ─────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
